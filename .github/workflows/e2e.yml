name: e2e

on:
  pull_request:
  push:
    branches: [master, main]

jobs:
  backend-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lifa
          POSTGRES_PASSWORD: lifa_dev_password
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lifa"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://lifa:lifa_dev_password@localhost:5432/lifa_dev?schema=public
      E2E_ADMIN_DATABASE_URL: postgresql://lifa:lifa_dev_password@localhost:5432/postgres
      E2E_TEST_DATABASE_URL: postgresql://lifa:lifa_dev_password@localhost:5432/lifa_test?schema=public
      JWT_SECRET: ci-only-secret

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The Prisma client is generated from the schema; do it explicitly so the
      # next step picks it up.
      - run: pnpm --filter backend exec prisma generate

      # Backend unit tests first — fail fast if they're broken.
      - run: pnpm --filter backend test

      # The e2e suite manages its own DB lifecycle (drops + creates `lifa_test`
      # via globalSetup), so we don't need a separate migrate step here.
      - run: pnpm --filter backend test:e2e
